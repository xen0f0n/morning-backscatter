name: Publish Morning Backscatter

on:
  push:
    branches: [main]

  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    name: Build site
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate content
        run: python scripts/validate_content.py

      - name: Build static site
        run: python scripts/build_site.py

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy GitHub Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4

  release:
    name: Create release notification
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install release dependencies
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML==6.0.2

      - name: Create release notes
        id: issue
        run: |
          python scripts/create_release_notes.py \
            --notes-file release-notes.md \
            --github-output "$GITHUB_OUTPUT"

      - name: Create or update GitHub Release
        if: steps.issue.outputs.has_issue == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.issue.outputs.tag }}
          TITLE: ${{ steps.issue.outputs.title }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" \
              --title "$TITLE" \
              --notes-file release-notes.md \
              --latest=false
          else
            gh release create "$TAG" \
              --title "$TITLE" \
              --notes-file release-notes.md \
              --latest=false
          fi