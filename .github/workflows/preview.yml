name: Preview Morning Backscatter

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  preview:
    name: Build preview artifact
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate content
        run: python scripts/validate_content.py

      - name: Build site including drafts
        run: python scripts/build_site.py --include-drafts

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: morning-backscatter-preview
          path: dist
